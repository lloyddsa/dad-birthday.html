<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Dad 🎉</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Verdana', sans-serif;
      background: linear-gradient(to right, #ffe0b2, #ffcc80);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 500px;
    }
    h1 {
      color: #d84315;
    }
    p {
      font-size: 1.2em;
      color: #4e342e;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #8d6e63;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Happy Birthday, Dad! 🎂</h1>
    <p>
      You're more than a father —<br>
      You're a mentor, friend, and inspiration.<br><br>
      Wishing you health, happiness, and all the joy in the world today!
    </p>
    <p class="footer">Made with ❤️ by [Your Name]</p>
  </div>
</body>
</html>
